<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YOLOv8 Detection - Real-Time Stream</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            margin-bottom: 30px;
        }

        .video-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .video-stream {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
        }

        .video-controls {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            height: fit-content;
        }

        .video-controls h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 1.1em;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 0.9em;
            font-weight: 500;
        }

        .control-group input,
        .control-group select,
        .control-group button {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .control-group button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .control-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .control-group button:active {
            transform: translateY(0);
        }

        .statistics {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .statistics h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box .value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-box .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .detections-panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-height: 400px;
            overflow-y: auto;
        }

        .detections-panel h2 {
            margin-bottom: 15px;
            color: #333;
        }

        .detection-item {
            background: #f5f5f5;
            padding: 12px;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
            border-radius: 4px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .detection-item .class-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .detection-item .confidence {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .status {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎥 OBJECT DETECTION</h1>
            <p>Real-time object detection streaming with FastAPI & React</p>
        </div>

        <div class="main-content">
            <div class="video-container">
                <img id="videoStream" class="video-stream" alt="Video Stream" />
            </div>

            <div class="video-controls">
                <div id="connectionStatus" class="status disconnected">
                    ⚪ Disconnected
                </div>

                <div class="control-group">
                    <label>Connection Type</label>
                    <select id="connectionType" onchange="changeConnectionType()">
                        <option value="websocket">WebSocket (Recommended)</option>
                        <option value="mjpeg">MJPEG Stream</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Video Source</label>
                    <input type="text" id="videoSource" value="0" placeholder="0 for webcam or file path" />
                </div>

                <div class="control-group">
                    <button onclick="startStream()">▶ Start Stream</button>
                </div>

                <div class="control-group">
                    <button onclick="stopStream()" style="background: #dc3545;">⏹ Stop Stream</button>
                </div>

                <hr style="margin: 15px 0; border: none; border-top: 1px solid #ddd;">

                <div class="control-group">
                    <label>Upload Image</label>
                    <input type="file" id="imageUpload" accept="image/*" onchange="detectImage()" />
                </div>

                <div class="control-group">
                    <label>Upload Video</label>
                    <input type="file" id="videoUpload" accept="video/*" />
                </div>

                <div class="control-group">
                    <button onclick="processVideoFile()">📹 Process Video</button>
                </div>
            </div>
        </div>

        <div class="statistics">
            <h2>📊 Detection Statistics</h2>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="value" id="detectionCount">0</div>
                    <div class="label">Objects Detected</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="avgConfidence">0%</div>
                    <div class="label">Avg Confidence</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="frameRate">0 FPS</div>
                    <div class="label">Frame Rate</div>
                </div>
                <div class="stat-box">
                    <div class="value" id="uptime">0s</div>
                    <div class="label">Stream Uptime</div>
                </div>
            </div>
        </div>

        <div class="detections-panel">
            <h2>🎯 Current Detections</h2>
            <div id="detectionsList">No detections yet...</div>
        </div>
    </div>

    <script>
        let ws = null;
        let connectionType = 'websocket';
        let isStreaming = false;
        let startTime = null;
        let frameCount = 0;
        let lastFrameTime = null;

        async function startStream() {
            const videoSource = document.getElementById('videoSource').value || '0';
            
            if (connectionType === 'websocket') {
                startWebSocketStream(videoSource);
            } else {
                startMJPEGStream(videoSource);
            }
        }

        function startWebSocketStream(source) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }

            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/ws/video?source=${source}`;
            
            ws = new WebSocket(wsUrl);
            isStreaming = true;
            startTime = Date.now();
            frameCount = 0;

            ws.onopen = () => {
                updateConnectionStatus(true);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.error) {
                    console.error('Stream error:', data.error);
                    updateConnectionStatus(false);
                    return;
                }

                // Display frame
                document.getElementById('videoStream').src = `data:image/jpeg;base64,${data.frame}`;

                // Update statistics
                updateStatistics(data.detections);
                updateDetectionsList(data.detections);

                frameCount++;
                calculateFrameRate();
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                updateConnectionStatus(false);
            };

            ws.onclose = () => {
                updateConnectionStatus(false);
                isStreaming = false;
            };
        }

        function startMJPEGStream(source) {
            const streamUrl = `/detect/video/stream?source=${source}`;
            document.getElementById('videoStream').src = streamUrl;
            isStreaming = true;
            startTime = Date.now();
            updateConnectionStatus(true);
        }

        function stopStream() {
            if (ws) {
                ws.close();
                ws = null;
            }
            isStreaming = false;
            document.getElementById('videoStream').src = '';
            updateConnectionStatus(false);
        }

        function changeConnectionType() {
            connectionType = document.getElementById('connectionType').value;
            if (isStreaming) {
                stopStream();
            }
        }

        async function detectImage() {
            const fileInput = document.getElementById('imageUpload');
            const file = fileInput.files[0];

            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/detect/image', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                document.getElementById('videoStream').src = `data:image/jpeg;base64,${data.image}`;
                updateDetectionsList(data.detections);
                updateStatistics(data.detections);
            } catch (error) {
                alert('Error detecting image: ' + error);
            }
        }

        async function processVideoFile() {
            const fileInput = document.getElementById('videoUpload');
            const file = fileInput.files[0];

            if (!file) {
                alert('Please select a video file');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/detect/video/file', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                alert('Video processing complete!\nOutput file: ' + data.output_file);
            } catch (error) {
                alert('Error processing video: ' + error);
            }
        }

        function updateStatistics(detections) {
            document.getElementById('detectionCount').textContent = detections.length;

            if (detections.length > 0) {
                const avgConf = (detections.reduce((sum, d) => sum + d.confidence, 0) / detections.length * 100).toFixed(1);
                document.getElementById('avgConfidence').textContent = avgConf + '%';
            } else {
                document.getElementById('avgConfidence').textContent = '0%';
            }

            // Update uptime
            if (startTime) {
                const uptime = Math.floor((Date.now() - startTime) / 1000);
                document.getElementById('uptime').textContent = uptime + 's';
            }
        }

        function calculateFrameRate() {
            const now = Date.now();
            if (lastFrameTime) {
                const fps = (1000 / (now - lastFrameTime)).toFixed(1);
                document.getElementById('frameRate').textContent = fps + ' FPS';
            }
            lastFrameTime = now;
        }

        function updateDetectionsList(detections) {
            const panel = document.getElementById('detectionsList');

            if (detections.length === 0) {
                panel.innerHTML = 'No detections...';
                return;
            }

            const classes = {};
            detections.forEach(d => {
                classes[d.class] = (classes[d.class] || 0) + 1;
            });

            panel.innerHTML = detections
                .map(d => `
                    <div class="detection-item">
                        <div class="class-name">${d.class}</div>
                        <div class="confidence">Confidence: ${(d.confidence * 100).toFixed(1)}%</div>
                    </div>
                `)
                .join('');
        }

        function updateConnectionStatus(connected) {
            const status = document.getElementById('connectionStatus');
            if (connected) {
                status.textContent = '🟢 Connected';
                status.className = 'status connected';
            } else {
                status.textContent = '🔴 Disconnected';
                status.className = 'status disconnected';
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateConnectionStatus(false);
        });
    </script>
</body>
</html>
